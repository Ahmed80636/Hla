<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Für Hla</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #330000 0%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            font-family: 'Playfair Display', serif;
        }

        .hero {
            position: relative;
            z-index: 10;
            text-align: center;
            perspective: 1000px;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            animation: pulse 2s infinite;
        }

        .arabic {
            font-size: 4rem;
            color: #ff4d4d;
            margin-top: 20px;
            text-shadow: 0 0 15px #ff4d4d;
        }

        .name { font-size: 2rem; opacity: 0.8; letter-spacing: 10px; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            font-size: 2rem;
            animation: explode 4s ease-out infinite;
        }

        @keyframes explode {
            0% { transform: translate(0,0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="name">HLA</div>
        <h1>I LOVE YOU</h1>
        <div class="arabic">أنا بحبك</div>
    </div>

    <script>
        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerHTML = Math.random() > 0.5 ? '❤️' : '🌹';
            
            // Zufällige Flugrichtung
            const dx = (Math.random() - 0.5) * 1000;
            const dy = (Math.random() - 0.5) * 1000;
            p.style.setProperty('--dx', dx + 'px');
            p.style.setProperty('--dy', dy + 'px');
            
            p.style.left = '50vw';
            p.style.top = '50vh';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 4000);
        }
        setInterval(createParticle, 100);
    </script>
</body>
</html>
