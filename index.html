<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Für Hla</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Hintergrund-Kachel-Muster */
            background-color: #2a0000;
            background-image: radial-gradient(circle, #550000 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Der vollflächige Blumen-Container */
        .full-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            font-size: 40px;
            z-index: 1;
            opacity: 0.3;
            pointer-events: none;
        }

        .center-box {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 50px;
            border-radius: 20px;
            border: 5px solid #ff0000;
            box-shadow: 0 0 50px #ff0000;
        }

        h1 { font-size: 6rem; color: #ffcccc; margin: 0; text-shadow: 0 0 20px red; }
        .arabic { font-size: 5rem; color: #ff0000; text-shadow: 0 0 10px white; }

        .particle {
            position: absolute;
            font-size: 3rem;
            animation: fly 2s linear infinite;
        }

        @keyframes fly {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Der Hintergrund ist jetzt voll mit Blumen -->
    <div class="full-bg">
        <script>
            for(let i=0; i<200; i++) document.write("🌹❤️");
        </script>
    </div>

    <div class="center-box">
        <h1>I LOVE YOU</h1>
        <div class="arabic">أنا بحبك</div>
        <h2 style="color:white">Hla</h2>
    </div>

    <script>
        function spawn() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerHTML = Math.random() > 0.5 ? '🌹' : '❤️';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 2 + 1 + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 3000);
        }
        setInterval(spawn, 50); // Extrem hohe Frequenz
    </script>
</body>
</html>
